steps:
- name: 'gcr.io/cloud-builders/docker'
  args: [ 'build', '-t', 'us-west1-docker.pkg.dev/$PROJECT_ID/my-repository/sample-app-prod:v1.0', '.' ]
- name: 'gcr.io/cloud-builders/kubectl'
  args: ['apply', '-f', 'prod/deployment.yaml', '--namespace=prod']
  env:
  - 'CLOUDSDK_COMPUTE_ZONE=us-west1-a'
  - 'CLOUDSDK_CONTAINER_CLUSTER=hello-cluster'
images:
- 'us-west1-docker.pkg.dev/$PROJECT_ID/my-repository/sample-app-prod:v1.0'
options:
  logging: CLOUD_LOGGING_ONLY
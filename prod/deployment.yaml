apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-deployment
  labels:
    app: hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
      - name: hello-app
        image: us-west1-docker.pkg.dev/YOUR_ACTUAL_PROJECT_ID/my-repository/sample-app-prod:v1.0
        ports:
        - containerPort: 8080